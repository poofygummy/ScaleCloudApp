# ScaleCloudApp lightweight xcodegen spec (based on the small historical form).
# This is secondary / for quick reference paths only.
#
# The primary, maximally upstream-compatible vehicle for the App layer build
# is the adapted copy of upstream nextcloud/ios Nextcloud.xcodeproj (see the
# edited project.pbxproj under ScaleCloudApp/ScaleCloudApp.xcodeproj or sibling).
# That pbxproj already correctly declares the many dozens of real client
# dependencies (RealmSwift, LucidBanner, MobileVLCKit, etc.) and will be
# narrowly edited for our layout (iOSClient/ + Brand/), plist, and ScaleCloudKit
# prebuilt linkage + FRAMEWORK_SEARCH_PATHS.
#
# The historical small yml form pointed at a flat "Sources". We preserve the
# overall shape here for easy diff vs history. If using this yml for a quick
# path, adjust sources below to the actual layout and ensure a ScaleCloudKit
# prebuilt (or generated project) is available via the project reference.

name: ScaleCloudApp
options:
  bundleIdPrefix: com.scalecloud
settings:
  base:
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"
targets:
  ScaleCloudApp:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    info:
      path: Brand/iOSClient.plist
    sources:
      - path: iOSClient
      - path: Brand
    settings:
      base:
        FRAMEWORK_SEARCH_PATHS: "$(inherited) $(BUILT_PRODUCTS_DIR) $(PROJECT_DIR)/../ScaleCloudKit/prebuilt $(PROJECT_DIR)/../ScaleCloudGo/prebuilt $(PROJECT_DIR)/../ScaleCloudSign/prebuilt $(PROJECT_DIR)/../ScaleCloudRenew/prebuilt"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
    dependencies:
      - framework: ../ScaleCloudKit/prebuilt/ScaleCloudKit.framework
        embed: true
      - framework: ../ScaleCloudSign/prebuilt/ScaleCloudSign.framework
        embed: true
      - framework: ../ScaleCloudRenew/prebuilt/ScaleCloudRenew.xcframework
        embed: true
      - package: Alamofire
      - package: KeychainAccess
      - package: LucidBanner
      - package: DropDown
      - package: EasyTipView
      - package: GzipSwift
        product: Gzip
      - package: LRUCache
      - package: Mantis
      - package: MarkdownKit
      - package: OpenSSL
      - package: Parchment
      - package: PopupView
      - package: QRCodeReader
      - package: Queuer
      - package: realm-swift
        product: RealmSwift
      - package: swifter
        product: Swifter
      - package: SwiftRichString
      - package: TagListView
      - package: TLPhotoPicker
      - package: vlckit-spm
        product: VLCKitSPM
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - package: firebase-ios-sdk
        product: FirebaseDatabase
      - package: swift-nio
        product: NIO
      - package: swift-nio-ssl
        product: NIOSSL
      - package: swift-collections
        product: Collections

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.10.2
  KeychainAccess:
    url: https://github.com/kishikawakatsuki/KeychainAccess
    from: 4.0.0
  LucidBanner:
    url: https://github.com/marinofaggiana/LucidBanner.git
    exactVersion: 0.7.1
  DropDown:
    url: https://github.com/AssistoLab/DropDown.git
    branch: master
  EasyTipView:
    url: https://github.com/marinofaggiana/EasyTipView.git
    branch: master
  GzipSwift:
    url: https://github.com/1024jp/GzipSwift
    exactVersion: 6.0.0
  LRUCache:
    url: https://github.com/nicklockwood/LRUCache.git
    from: 1.0.7
  Mantis:
    url: https://github.com/marinofaggiana/Mantis.git
    exactVersion: 1.0.0
  MarkdownKit:
    url: https://github.com/bmoliveira/MarkdownKit.git
    from: 1.7.1
  OpenSSL:
    url: https://github.com/krzyzanowskim/OpenSSL.git
    from: 3.6.0
  Parchment:
    url: https://github.com/rechsteiner/Parchment.git
    exactVersion: 3.3.0
  PopupView:
    url: https://github.com/exyte/PopupView.git
    from: 2.9.1
  QRCodeReader:
    url: https://github.com/yannickl/QRCodeReader.swift.git
    from: 10.1.1
  Queuer:
    url: https://github.com/FabrizioBrancati/Queuer.git
    from: 2.0.0
  realm-swift:
    url: https://github.com/realm/realm-swift.git
    exactVersion: 20.0.4
  swifter:
    url: https://github.com/httpswift/swifter.git
    branch: stable
  SwiftRichString:
    url: https://github.com/malcommac/SwiftRichString.git
    from: 3.7.2
  TagListView:
    url: https://github.com/ElaWorkshop/TagListView.git
    from: 1.0.0
  TLPhotoPicker:
    url: https://github.com/tilltue/TLPhotoPicker.git
    from: 2.0.0
  vlckit-spm:
    url: https://github.com/tylerjonesio/vlckit-spm.git
    from: 3.5.1
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 12.0.0
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: 2.65.0
  swift-nio-ssl:
    url: https://github.com/apple/swift-nio-ssl.git
    from: 2.26.0
  swift-collections:
    url: https://github.com/apple/swift-collections.git
    exactVersion: 1.1.4